type Agent @entity {
  id: ID! # address
  name: String!
  bio: String
  registeredAt: BigInt!
  reputation: BigInt!
  isActive: Boolean!
  bountiesAssigned: [Bounty!]! @derivedFrom(field: "assignedAgent")
  bountiesCompleted: [Bounty!]! @derivedFrom(field: "completedBy")
}

type Bounty @entity {
  id: ID! # bountyId
  client: String! # address
  amount: BigInt!
  codeUri: String!
  isOpen: Boolean!
  assignedAgent: Agent
  completedBy: Agent
  reportUri: String
  createdAt: BigInt!
  closedAt: BigInt
  txHash: String!
}
